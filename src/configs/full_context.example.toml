# Keep API keys in .env by default

[run]
name = "Full Context Baseline on LoCoMo"
output_dir = "runs/full_context_example"
concurrency = 32


[dataset]
name = "locomo"
path = "data/locomo10.json"
# Benchmark uses conversations 0..9.
conv_indices = "0-9"
# Excluded 5 which are adversarial.
exclude_category = 5

[algorithm]
name = "full_context"


[models.answer]
type = "llm"
model = "your-answer-model"
base_url = "https://api.openai.com/v1"
api_key_env = "ANSWER_API_KEY"
temperature = 0.0


[models.judge]
type = "llm"
model = "your-judge-model"
base_url = "https://api.openai.com/v1"
api_key_env = "JUDGE_API_KEY"
temperature = 0.0
